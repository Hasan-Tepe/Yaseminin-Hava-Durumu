<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hava Durumu Asistanı</title>
    <!-- Tailwind CSS (CDN for simple deploy) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Tailwind Configuration for Premium Aesthetic -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        wine: {
                            50: '#fdf8f8',
                            100: '#f7eaea',
                            200: '#edd1d3',
                            300: '#dfaeb3',
                            400: '#cb828b',
                            500: '#b4606a',
                            600: '#9b4d58', // Rich burgundy
                            700: '#823c46',
                            800: '#6d353e',
                            900: '#5c3036', // Darkest wine
                            950: '#301518',
                        },
                        blush: {
                            100: '#fffcfc',
                            200: '#ffe5e7',
                            300: '#ffc2c7',
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(92, 48, 54, 0.4)',
                        'glow': '0 0 25px rgba(155, 77, 88, 0.3)',
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS for micro-animations and smooth scroll -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- PWA Settings -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icon.svg') }}">
    <meta name="theme-color" content="#800020">
</head>
<body class="bg-gradient-to-br from-wine-900 via-wine-800 to-wine-950 min-h-screen text-wine-50 antialiased selection:bg-wine-400 selection:text-white flex flex-col relative overflow-x-hidden">

    <!-- Dynamic Weather Background Container -->
    <div id="weather-background" class="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-50"></div>
    
    <!-- Navbar/Header -->
    <header class="w-full max-w-md mx-auto pt-8 px-6 pb-2 flex justify-between items-center transition-all duration-300 relative z-10">
        <div>
            <h1 class="text-2xl font-semibold text-white tracking-tight">Weather<span class="text-wine-300 font-light">Mate</span></h1>
        </div>
        <a href="{{ url_for('settings_page') }}" class="p-2 rounded-full bg-white/10 backdrop-blur-md shadow-soft text-white hover:bg-white/20 transition-all transform hover:rotate-12 duration-300 border border-white/20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </a>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow w-full max-w-md mx-auto px-6 py-6 fade-in-up">
        {% block content %}{% endblock %}
    </main>

    <!-- App Logic Scripts -->
    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 w-full max-w-sm px-4">
        {% for category, message in messages %}
          <div class="rounded-xl px-4 py-3 shadow-glow transition-all mb-2 flex items-center shadow-lg text-sm text-center justify-center {{ 'bg-wine-100 text-wine-900 border border-wine-300' if category == 'success' else 'bg-red-100 text-red-900 border border-red-300' }}">
            {{ message }}
          </div>
        {% endfor %}
        </div>
        
        <script>
          setTimeout(function() {
            const flashes = document.querySelectorAll('.fixed.bottom-6 > div');
            flashes.forEach(f => {
                f.style.opacity = '0';
                setTimeout(() => f.remove(), 500);
            });
          }, 4000);
        </script>
      {% endif %}
    {% endwith %}

    <script>
        {% if weather %}
        window.weatherId = {{ weather.id }};
        window.weatherIcon = "{{ weather.icon }}";
        {% else %}
        window.weatherId = 800; // Default fallback to clear
        window.weatherIcon = "01d";
        {% endif %}
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        {% block extra_js %}{% endblock %}

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("{{ url_for('static', filename='sw.js') }}")
                    .then(registration => {
                        console.log('SW registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('SW registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
